<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My World Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  height: 100%;
}

#map {
  width: 100%;
  height: 100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map', {
  crs: L.CRS.Simple
});

var bounds = [[0,0],[832,1470]];

L.imageOverlay(
  'Coia 2026-06-23-10-50.png',
  bounds
).addTo(map);

map.fitBounds(bounds);
map.setMaxBounds(bounds);
L.marker([435,551])
.addTo(map)
.bindPopup(`
<h2>Principality of Jookroo</h2>
<p>NetJJ Son.</p>
`);
L.marker([476,935])
.addTo(map)
.bindPopup(`
<h2>Kingdom of JJ</h2>
<p>Grumpy cat.</p>
`);
L.marker([308,1291])
.addTo(map)
.bindPopup(`
<h2>Kingdom of Net</h2>
<p>Owner of the grumpy cat.</p>
`);
L.marker([653,709])
.addTo(map)
.bindPopup(`
<h2>Domundi Empire</h2>
<p>The heart of the Universe.</p>
`);
  
</script>

</body>
</html>
