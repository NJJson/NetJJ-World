<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My World Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  height: 100%;
}

#map {
  width: 100%;
  height: 100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map', {
  crs: L.CRS.Simple
});

var bounds = [[0,0],[1000,1000]];

L.imageOverlay(
  'Coia 2026-06-23-10-50.png',
  bounds
).addTo(map);

map.fitBounds(bounds);

</script>

</body>
</html>
